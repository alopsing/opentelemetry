kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: otel-poc
nodes:
  - role: control-plane
    extraPortMappings:
      - containerPort: 30686
        hostPort: 16686
      - containerPort: 30300
        hostPort: 3000
      - containerPort: 30090
        hostPort: 9090
      - containerPort: 30080
        hostPort: 8080
  - role: worker
