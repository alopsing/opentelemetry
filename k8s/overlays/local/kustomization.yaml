apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
namePrefix: ""
labels:
  - pairs:
      environment: local
patches:
  - patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/env/0/value
        value: "local"
    target:
      kind: Deployment
      name: api-gateway
  - patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/env/0/value
        value: "local"
    target:
      kind: Deployment
      name: order-service
  - patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/env/0/value
        value: "local"
    target:
      kind: Deployment
      name: inventory-service
