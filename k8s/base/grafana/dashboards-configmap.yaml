apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: otel-poc
data:
  otel-poc.json: |
    {
      "title": "OpenTelemetry POC",
      "uid": "otel-poc-dashboard",
      "version": 2,
      "schemaVersion": 36,
      "refresh": "10s",
      "time": { "from": "now-1h", "to": "now" },
      "timezone": "browser",
      "graphTooltip": 1,
      "tags": ["opentelemetry", "otel", "poc"],
      "editable": true,
      "panels": [

        {
          "id": 1,
          "title": "Overview",
          "type": "row",
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 0 }
        },

        {
          "id": 2,
          "title": "Business Requests (excl. /health)",
          "description": "Total order requests through the API gateway in the last 5 minutes",
          "type": "stat",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 4, "w": 8, "x": 0, "y": 1 },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "colorMode": "background",
            "graphMode": "area",
            "justifyMode": "auto",
            "textMode": "auto",
            "orientation": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "orange", "value": 500 },
                  { "color": "red", "value": 2000 }
                ]
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum(increase(otel_api_gateway_requests_total{route!=\"/health\"}[5m]))",
              "instant": true,
              "legendFormat": "Requests",
              "refId": "A"
            }
          ]
        },

        {
          "id": 3,
          "title": "Error Rate (5xx)",
          "description": "Percentage of requests returning 5xx, excluding /health probes",
          "type": "stat",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 4, "w": 8, "x": 8, "y": 1 },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "colorMode": "background",
            "graphMode": "area",
            "justifyMode": "auto",
            "textMode": "auto",
            "orientation": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "orange", "value": 1 },
                  { "color": "red", "value": 5 }
                ]
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "100 * sum(rate(otel_api_gateway_requests_total{status=~\"5..\", route!=\"/health\"}[5m])) / sum(rate(otel_api_gateway_requests_total{route!=\"/health\"}[5m]))",
              "instant": true,
              "legendFormat": "Error %",
              "refId": "A"
            }
          ]
        },

        {
          "id": 4,
          "title": "p95 Latency",
          "description": "95th percentile request duration for POST /order",
          "type": "stat",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 4, "w": 8, "x": 16, "y": 1 },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "colorMode": "background",
            "graphMode": "area",
            "justifyMode": "auto",
            "textMode": "auto",
            "orientation": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "unit": "ms",
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "orange", "value": 200 },
                  { "color": "red", "value": 500 }
                ]
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "histogram_quantile(0.95, sum(rate(otel_api_gateway_request_duration_ms_milliseconds_bucket{route!=\"/health\"}[5m])) by (le))",
              "instant": true,
              "legendFormat": "p95 ms",
              "refId": "A"
            }
          ]
        },

        {
          "id": 5,
          "title": "Metrics",
          "type": "row",
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 5 }
        },

        {
          "id": 6,
          "title": "Request Rate per Service (excl. /health)",
          "type": "timeseries",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 6 },
          "options": {
            "tooltip": { "mode": "multi", "sort": "desc" },
            "legend": { "displayMode": "table", "placement": "bottom", "showLegend": true, "calcs": ["lastNotNull", "max"] }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "color": { "mode": "palette-classic" },
              "custom": {
                "drawStyle": "line",
                "lineWidth": 2,
                "fillOpacity": 10,
                "lineInterpolation": "linear",
                "showPoints": "never",
                "spanNulls": false
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum(rate(otel_api_gateway_requests_total{route!=\"/health\"}[1m])) by (route)",
              "legendFormat": "api-gateway {{route}}",
              "refId": "A"
            },
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum(rate(otel_order_service_orders_total[1m])) by (status)",
              "legendFormat": "order-service ({{status}})",
              "refId": "B"
            },
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum(rate(otel_inventory_service_checks_total[1m])) by (result)",
              "legendFormat": "inventory ({{result}})",
              "refId": "C"
            }
          ]
        },

        {
          "id": 7,
          "title": "Request Duration p95 by Route (excl. /health)",
          "type": "timeseries",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 6 },
          "options": {
            "tooltip": { "mode": "multi", "sort": "desc" },
            "legend": { "displayMode": "table", "placement": "bottom", "showLegend": true, "calcs": ["lastNotNull", "max"] }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "ms",
              "color": { "mode": "palette-classic" },
              "custom": {
                "drawStyle": "line",
                "lineWidth": 2,
                "fillOpacity": 10,
                "lineInterpolation": "linear",
                "showPoints": "never",
                "spanNulls": false
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "histogram_quantile(0.95, sum(rate(otel_api_gateway_request_duration_ms_milliseconds_bucket{route!=\"/health\"}[5m])) by (le, route))",
              "legendFormat": "p95 {{route}}",
              "refId": "A"
            },
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "histogram_quantile(0.50, sum(rate(otel_api_gateway_request_duration_ms_milliseconds_bucket{route!=\"/health\"}[5m])) by (le, route))",
              "legendFormat": "p50 {{route}}",
              "refId": "B"
            }
          ]
        },

        {
          "id": 8,
          "title": "Inventory Stock Levels",
          "type": "bargauge",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 5, "w": 12, "x": 0, "y": 14 },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "orientation": "horizontal",
            "displayMode": "gradient",
            "showUnfilled": true,
            "minVizWidth": 0,
            "minVizHeight": 10
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "orange", "value": 5 },
                  { "color": "green", "value": 10 }
                ]
              },
              "min": 0
            },
            "overrides": []
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "otel_inventory_service_stock_level",
              "legendFormat": "{{item_name}} ({{item_id}})",
              "instant": true,
              "refId": "A"
            }
          ]
        },

        {
          "id": 9,
          "title": "Order Outcomes",
          "type": "piechart",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 5, "w": 12, "x": 12, "y": 14 },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "pieType": "donut",
            "displayLabels": ["name", "percent"],
            "legend": { "displayMode": "table", "placement": "right", "showLegend": true }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "color": { "mode": "palette-classic" }
            },
            "overrides": []
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "sum(increase(otel_order_service_orders_total[1h])) by (status)",
              "legendFormat": "{{status}}",
              "instant": true,
              "refId": "A"
            }
          ]
        },

        {
          "id": 10,
          "title": "Logs",
          "type": "row",
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 19 }
        },

        {
          "id": 11,
          "title": "All Services — Live Logs",
          "description": "Logs from all 3 services. Click the traceid field to jump to the trace in Jaeger.",
          "type": "logs",
          "datasource": { "type": "loki", "uid": "loki" },
          "gridPos": { "h": 10, "w": 16, "x": 0, "y": 20 },
          "options": {
            "dedupStrategy": "none",
            "enableLogDetails": true,
            "prettifyLogMessage": false,
            "showCommonLabels": false,
            "showLabels": true,
            "showTime": true,
            "sortOrder": "Descending",
            "wrapLogMessage": false
          },
          "targets": [
            {
              "datasource": { "type": "loki", "uid": "loki" },
              "expr": "{job=~\"api-gateway|order-service|inventory-service\"} | json body | body != \"Request processed\" or body =~ \"(?i)error|fail|reject|warn\"",
              "maxLines": 200,
              "refId": "A"
            }
          ]
        },

        {
          "id": 12,
          "title": "Errors Only",
          "description": "Error and warning logs across all services. Each traceid links to the full trace in Jaeger.",
          "type": "logs",
          "datasource": { "type": "loki", "uid": "loki" },
          "gridPos": { "h": 10, "w": 8, "x": 16, "y": 20 },
          "options": {
            "dedupStrategy": "none",
            "enableLogDetails": true,
            "prettifyLogMessage": false,
            "showCommonLabels": false,
            "showLabels": true,
            "showTime": true,
            "sortOrder": "Descending",
            "wrapLogMessage": true
          },
          "targets": [
            {
              "datasource": { "type": "loki", "uid": "loki" },
              "expr": "{job=~\"api-gateway|order-service|inventory-service\", level=~\"ERROR|WARN\"}",
              "maxLines": 100,
              "refId": "A"
            }
          ]
        },

        {
          "id": 13,
          "title": "Traces",
          "type": "row",
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 30 }
        },

        {
          "id": 14,
          "title": "How to correlate Logs → Traces",
          "type": "text",
          "gridPos": { "h": 7, "w": 24, "x": 0, "y": 31 },
          "options": {
            "mode": "markdown",
            "content": "## Logs → Traces correlation\n\n**From the Logs panel above:**\n1. Expand any log line by clicking it → find the `traceid` field\n2. Click the `traceid` value — it links directly to that trace in Jaeger\n\n**From Jaeger Explore:**\n1. Click the compass icon (Explore) in the left sidebar\n2. Select the **Jaeger** datasource\n3. Search by service: `api-gateway`, `order-service`, or `inventory-service`\n4. Click any trace row to see the full flame-graph across all 3 services\n\n**Filter logs for a specific trace:**\n```\n{job=~\"api-gateway|order-service|inventory-service\"} |= \"<paste-traceid-here>\"\n```\nThis shows every log line from all 3 services that handled that one request.\n\n**Useful Loki queries:**\n```\n# Business logs only (no health probes)\n{job=~\"api-gateway|order-service|inventory-service\"} | json body | body != \"Request processed\"\n\n# Errors only\n{job=~\"api-gateway|order-service|inventory-service\", level=\"ERROR\"}\n\n# Rejected orders\n{job=\"order-service\"} |= \"rejected\"\n```"
          }
        }

      ],
      "templating": { "list": [] },
      "annotations": { "list": [] },
      "links": [],
      "style": "dark",
      "fiscalYearStartMonth": 0,
      "liveNow": false
    }
