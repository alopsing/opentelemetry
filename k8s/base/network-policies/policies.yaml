# ── otel-collector ────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: otel-collector
  namespace: otel-poc
spec:
  podSelector:
    matchLabels:
      app: otel-collector
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: api-gateway
        - podSelector:
            matchLabels:
              app: order-service
        - podSelector:
            matchLabels:
              app: inventory-service
        - podSelector:
            matchLabels:
              app: product-service
      ports:
        - port: 4317
          protocol: TCP
        - port: 4318
          protocol: TCP
    - from:
        - podSelector:
            matchLabels:
              app: prometheus
      ports:
        - port: 8888
          protocol: TCP
        - port: 8889
          protocol: TCP
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: jaeger
      ports:
        - port: 4317
          protocol: TCP
    - to:
        - podSelector:
            matchLabels:
              app: loki
      ports:
        - port: 3100
          protocol: TCP
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
---
