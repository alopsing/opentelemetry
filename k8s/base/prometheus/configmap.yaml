apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: otel-poc
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
      external_labels:
        monitor: 'otel-poc'

    alerting:
      alertmanagers:
        - static_configs:
            - targets: ['alertmanager:9093']

    rule_files:
      - /etc/prometheus/alerts.yml
      - /etc/prometheus/recording_rules.yml

    scrape_configs:
      - job_name: 'otel-collector'
        static_configs:
          - targets: ['otel-collector:8889']
        metrics_path: '/metrics'
        scrape_interval: 10s

      - job_name: 'otel-collector-internal'
        static_configs:
          - targets: ['otel-collector:8888']
        metrics_path: '/metrics'
        scrape_interval: 15s

      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']

  alerts.yml: |
    groups:
      - name: application-alerts
        interval: 30s
        rules:
          - alert: HighErrorRate
            expr: |
              100 * sum(rate(otel_api_gateway_requests_total{status=~"5..",route!="/health"}[5m]))
              / sum(rate(otel_api_gateway_requests_total{route!="/health"}[5m])) > 5
            for: 2m
            labels:
              severity: warning
            annotations:
              summary: "High error rate on api-gateway"
              description: "Error rate is {{ $value | printf \"%.1f\" }}% over the last 5 minutes."

          - alert: HighLatencyP95
            expr: |
              histogram_quantile(0.95,
                sum(rate(otel_api_gateway_request_duration_ms_milliseconds_bucket{route!="/health"}[5m])) by (le)
              ) > 1000
            for: 2m
            labels:
              severity: warning
            annotations:
              summary: "High p95 latency on api-gateway"
              description: "p95 latency is {{ $value | printf \"%.0f\" }}ms."

      - name: collector-alerts
        interval: 30s
        rules:
          - alert: CollectorExporterQueueNearFull
            expr: |
              otelcol_exporter_queue_size / otelcol_exporter_queue_capacity > 0.8
            for: 2m
            labels:
              severity: warning
            annotations:
              summary: "OTel Collector exporter queue near capacity"
              description: "Exporter {{ $labels.exporter }} queue is {{ $value | printf \"%.0f%%\" }} full."

          - alert: CollectorDroppingData
            expr: |
              sum(rate(otelcol_exporter_send_failed_spans_total[5m])) > 0
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: "OTel Collector is dropping spans"
              description: "Collector is failing to export spans. Check exporter connectivity."

  recording_rules.yml: |
    groups:
      - name: slo-recording-rules
        interval: 30s
        rules:
          - record: job:api_gateway_requests:rate5m
            expr: sum(rate(otel_api_gateway_requests_total{route!="/health"}[5m]))

          - record: job:api_gateway_errors:rate5m
            expr: sum(rate(otel_api_gateway_requests_total{status=~"5..",route!="/health"}[5m]))

          - record: job:api_gateway_error_rate:ratio5m
            expr: job:api_gateway_errors:rate5m / job:api_gateway_requests:rate5m

          - record: job:api_gateway_latency_p95:5m
            expr: |
              histogram_quantile(0.95,
                sum(rate(otel_api_gateway_request_duration_ms_milliseconds_bucket{route!="/health"}[5m])) by (le)
              )
