apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config
  namespace: otel-poc
data:
  alertmanager.yml: |
    global:
      resolve_timeout: 5m

    route:
      group_by: ['alertname', 'severity']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 1h
      receiver: 'null-receiver'
      routes:
        - match:
            severity: critical
          receiver: 'null-receiver'

    receivers:
      - name: 'null-receiver'

    inhibit_rules:
      - source_match:
          severity: critical
        target_match:
          severity: warning
        equal: ['alertname']
