apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: otel-poc
type: Opaque
# Values are base64-encoded. For a real environment use Sealed Secrets / Vault / ESO.
# otel       → b3RlbA==
# otel_secret → b3RlbF9zZWNyZXQ=
# products   → cHJvZHVjdHM=
stringData:
  POSTGRES_USER:     otel
  POSTGRES_PASSWORD: otel_secret
  POSTGRES_DB:       products
