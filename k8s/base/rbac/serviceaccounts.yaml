# ── App Services ──────────────────────────────────────────────
apiVersion: v1
kind: ServiceAccount
metadata:
  name: api-gateway
  namespace: otel-poc
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: order-service
  namespace: otel-poc
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: inventory-service
  namespace: otel-poc
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: product-service
  namespace: otel-poc
---
# ── Database ──────────────────────────────────────────────────
apiVersion: v1
kind: ServiceAccount
metadata:
  name: postgres
  namespace: otel-poc
---
# ── OTel Collector ────────────────────────────────────────────
apiVersion: v1
kind: ServiceAccount
metadata:
  name: otel-collector
  namespace: otel-poc
---
# ── Prometheus ────────────────────────────────────────────────
apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus
  namespace: otel-poc
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: otel-poc-prometheus
rules:
  - apiGroups: [""]
    resources: [nodes, nodes/metrics, services, endpoints, pods]
    verbs: [get, list, watch]
  - apiGroups: [""]
    resources: [configmaps]
    verbs: [get]
  - nonResourceURLs: [/metrics, /metrics/cadvisor]
    verbs: [get]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: otel-poc-prometheus
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: otel-poc-prometheus
subjects:
  - kind: ServiceAccount
    name: prometheus
    namespace: otel-poc
---
# ── Grafana ───────────────────────────────────────────────────
apiVersion: v1
kind: ServiceAccount
metadata:
  name: grafana
  namespace: otel-poc
---
# ── Loki ──────────────────────────────────────────────────────
apiVersion: v1
kind: ServiceAccount
metadata:
  name: loki
  namespace: otel-poc
---
# ── Jaeger ────────────────────────────────────────────────────
apiVersion: v1
kind: ServiceAccount
metadata:
  name: jaeger
  namespace: otel-poc
---
# ── Alertmanager ──────────────────────────────────────────────
apiVersion: v1
kind: ServiceAccount
metadata:
  name: alertmanager
  namespace: otel-poc
